<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OTT Key Encryptor</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #05070b;
        --panel: rgba(12, 18, 28, 0.78);
        --line: rgba(80, 218, 255, 0.32);
        --text: #f5fbff;
        --muted: #9db1c3;
        --accent: #27d7ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        padding: 24px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background: linear-gradient(135deg, #05070b, #07131d);
        letter-spacing: 0;
      }

      main {
        width: min(980px, 100%);
        margin: 0 auto;
        display: grid;
        gap: 18px;
      }

      section {
        padding: 18px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: var(--panel);
      }

      textarea,
      input,
      button {
        font: inherit;
      }

      textarea,
      input {
        width: 100%;
        color: var(--text);
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 8px;
      }

      textarea {
        min-height: 250px;
        padding: 12px;
        resize: vertical;
      }

      input {
        height: 42px;
        padding: 0 12px;
      }

      button {
        min-height: 42px;
        padding: 0 16px;
        border: 0;
        border-radius: 8px;
        color: #02141a;
        font-weight: 800;
        background: linear-gradient(135deg, #72f0ff, var(--accent));
        cursor: pointer;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
      }

      .muted {
        color: var(--muted);
      }

      @media (max-width: 780px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <script src="../config.js"></script>
  </head>
  <body>
    <main>
      <section>
        <h1>OTT JSON Encryptor</h1>
        <p class="muted">Paste any plaintext OTT JSON file, encrypt it with the fixed passphrase, then upload the encrypted wrapper in its place.</p>
        <label>
          Passphrase
          <input id="passphrase" type="text" />
        </label>
      </section>
      <div class="grid">
        <section>
          <h2>Plain JSON</h2>
          <textarea id="plain"></textarea>
        </section>
        <section>
          <h2>Encrypted wrapper</h2>
          <textarea id="output" readonly></textarea>
        </section>
      </div>
      <section>
        <button id="encrypt" type="button">Encrypt</button>
        <span id="status" class="muted"></span>
      </section>
    </main>

    <script>
      const config = window.OTT_CONFIG || {};
      const passphrase = document.getElementById("passphrase");
      const plain = document.getElementById("plain");
      const output = document.getElementById("output");
      const status = document.getElementById("status");

      passphrase.value = config.fixedKeyPassphrase || "OTT_DEMO_FIXED_KEY_2026";
      plain.value = JSON.stringify({
        demo_video: {
          key_id: "ed0102030405060708090a0b0c0d0e0f",
          key: "f0e0d0c0b0a090807060504030201000"
        }
      }, null, 2);

      document.getElementById("encrypt").addEventListener("click", async () => {
        try {
          JSON.parse(plain.value);
          const wrapper = await encryptText(plain.value, passphrase.value);
          output.value = JSON.stringify(wrapper, null, 2);
          status.textContent = "Encrypted.";
        } catch (error) {
          console.error(error);
          status.textContent = "Input must be valid JSON.";
        }
      });

      async function encryptText(text, phrase) {
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const key = await deriveKey(phrase);
        const ciphertext = await crypto.subtle.encrypt(
          { name: "AES-GCM", iv },
          key,
          new TextEncoder().encode(text)
        );

        return {
          encrypted: true,
          algorithm: "AES-GCM",
          iv: bufferToBase64Url(iv),
          ciphertext: bufferToBase64Url(ciphertext)
        };
      }

      async function deriveKey(phrase) {
        const digest = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(phrase));
        return crypto.subtle.importKey("raw", digest, "AES-GCM", false, ["encrypt"]);
      }

      function bufferToBase64Url(buffer) {
        const bytes = new Uint8Array(buffer);
        let binary = "";
        for (const byte of bytes) {
          binary += String.fromCharCode(byte);
        }
        return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
      }
    </script>
  </body>
</html>
